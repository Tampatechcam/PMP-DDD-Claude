# Next.js 14 App Router — Netlify applies the OpenNext adapter automatically.
# Do not set `publish` to `.next`; the runtime plugin provisions functions + assets.
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Do NOT set NODE_ENV=production here — Netlify uses it during `npm install`
  # and would skip every devDependency, including `typescript`, which Next
  # needs to compile `.tsx` files (and the `@/*` path alias resolution that
  # depends on it). `next build` already outputs a production bundle on its
  # own; the runtime will set NODE_ENV correctly at request time.
